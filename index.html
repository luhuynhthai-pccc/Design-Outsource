<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý học sinh</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Danh sách học sinh (D1 Database)</h1>
    <table id="student-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Họ và Tên</th>
                <th>Lớp</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="3">Đang tải dữ liệu...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('/api/students')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#student-table tbody');
                tbody.innerHTML = '';
                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="3">Lỗi: ${data.error}</td></tr>`;
                    return;
                }
                data.forEach(student => {
                    tbody.innerHTML += `<tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.class}</td>
                    </tr>`;
                });
            })
            .catch(err => {
                console.error(err);
                document.querySelector('#student-table tbody').innerHTML = '<tr><td colspan="3">Lỗi kết nối API</td></tr>';
            });
    </script>
</body>
</html>
